<!DOCTYPE html>
<html>
<head>
    <title>AI Cyber Command Center</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #020617;
            color: #00f0ff;
            font-family: monospace;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                transparent,
                transparent 2px,
                rgba(0,255,255,0.05) 3px
            );
            pointer-events: none;
        }

        h1 {
            text-align: center;
            text-shadow: 0 0 20px cyan;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            padding: 10px;
        }

        .panel {
            background: rgba(0,255,255,0.05);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 20px rgba(0,255,255,0.1);
        }

        .log {
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }

        .critical {
            color: red;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        canvas {
            width: 100% !important;
        }

        svg {
            width: 100%;
            height: 300px;
        }
    </style>
</head>

<body>

<h1>🧠 AI CYBER COMMAND CENTER</h1>

<div class="grid">

    <!-- LEFT SIDE -->
    <div>

        <div class="panel">
            <h3>📊 Threat Distribution</h3>
            <canvas id="chart"></canvas>
        </div>

        <div class="panel">
            <h3>🌐 Network Activity Map</h3>
            <svg id="graph"></svg>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div>

        <div class="panel">
            <h3>⚡ Live Alerts</h3>
            <div id="log" class="log"></div>
        </div>

        <div class="panel">
            <h3>📡 System Stats</h3>
            <p>Total: <span id="total"></span></p>
            <p>High: <span id="high"></span></p>
            <p>Medium: <span id="medium"></span></p>
            <p>Critical: <span id="critical"></span></p>
        </div>

    </div>

</div>

<script>
let chart;
let nodes = [];
let links = [];

async function loadData() {
    const res = await fetch("/api/alerts");
    const data = await res.json();

    let high=0, medium=0, critical=0;

    const log = document.getElementById("log");
    log.innerHTML = "";

    nodes = [];
    links = [];

    data.slice(0, 20).forEach(a => {
        const ip = a[0];
        const sev = a[1];

        log.innerHTML += `<div class="${sev.toLowerCase()}">⚠ ${ip} - ${sev}</div>`;

        nodes.push({id: ip});
        links.push({source: "SYSTEM", target: ip});

        if (sev==="High") high++;
        if (sev==="Medium") medium++;
        if (sev==="Critical") critical++;
    });

    document.getElementById("total").innerText = data.length;
    document.getElementById("high").innerText = high;
    document.getElementById("medium").innerText = medium;
    document.getElementById("critical").innerText = critical;

    updateChart(high, medium, critical);
    drawGraph();
}

function updateChart(h, m, c) {
    if (!chart) {
        chart = new Chart(document.getElementById("chart"), {
            type: "bar",
            data: {
                labels: ["High","Medium","Critical"],
                datasets: [{
                    data: [h,m,c],
                    backgroundColor: ["orange","yellow","red"]
                }]
            }
        });
    } else {
        chart.data.datasets[0].data = [h,m,c];
        chart.update();
    }
}

function drawGraph() {
    const svg = d3.select("#graph");
    svg.selectAll("*").remove();

    const width = 400, height = 300;

    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).distance(50).id(d => d.id))
        .force("charge", d3.forceManyBody().strength(-100))
        .force("center", d3.forceCenter(width/2, height/2));

    const link = svg.append("g")
        .selectAll("line")
        .data(links)
        .enter().append("line")
        .style("stroke","cyan");

    const node = svg.append("g")
        .selectAll("circle")
        .data(nodes)
        .enter().append("circle")
        .attr("r",5)
        .style("fill","red");

    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node
            .attr("cx", d => d.x)
            .attr("cy", d => d.y);
    });
}

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
